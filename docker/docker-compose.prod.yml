version: '3.8'

services:
  # PostgreSQL 数据库（生产环境）
  db:
    image: postgres:15-alpine
    container_name: dormfix-db-prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # 生产环境不暴露数据库端口
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dormfix-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Django 后端（生产环境）
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: dormfix-backend-prod
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn dormfix_backend.wsgi:application 
             --bind 0.0.0.0:8000 
             --workers 4 
             --threads 2
             --timeout 120
             --max-requests 1000
             --max-requests-jitter 50
             --access-logfile -
             --error-logfile -"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    # 生产环境不暴露后端端口，通过 Nginx 代理
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=False
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dormfix-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # Vue 前端 + Nginx（生产环境）
  frontend:
    build:
      context: ../frontend-vue
      dockerfile: ../docker/frontend.Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    container_name: dormfix-frontend-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static_volume:/usr/share/nginx/html/static:ro
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL 证书（如果有）
      # - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - dormfix-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

volumes:
  postgres_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local

networks:
  dormfix-network:
    driver: bridge
