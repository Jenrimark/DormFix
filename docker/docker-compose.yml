version: '3.8'

services:
  # PostgreSQL 数据库
  db:
    image: postgres:15-alpine
    container_name: dormfix-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dormfix}
      POSTGRES_USER: ${POSTGRES_USER:-dormfix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dormfix_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dormfix}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dormfix-network

  # Django 后端
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: dormfix-backend
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn dormfix_backend.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    volumes:
      - ../:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-dormfix}:${POSTGRES_PASSWORD:-dormfix_password}@db:5432/${POSTGRES_DB:-dormfix}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-change-this-in-production}
      - DEBUG=${DEBUG:-True}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dormfix-network

  # Vue 前端
  frontend:
    build:
      context: ../frontend-vue
      dockerfile: ../docker/frontend.Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8000/api}
    container_name: dormfix-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - dormfix-network

volumes:
  postgres_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local

networks:
  dormfix-network:
    driver: bridge
